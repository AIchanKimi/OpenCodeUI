# ============================================
# OpenCode WebUI - Docker Compose (Frontend Dev)
# ============================================
#
# 架构:
#   gateway  (Caddy) :6658 -> 主入口，继续反代 frontend / backend
#                     :6659 -> 后端 preview 入口
#   frontend (Vite)  :3000 -> 本地源码热更新开发服务
#   backend  (opencode):4096 -> opencode serve
#
# 使用方法:
#   cp .env.example .env    # 填写 API Key
#   docker compose -f docker-compose.dev.yml up -d --build
#
# 说明:
#   - 前端源码通过 bind mount 挂进容器，修改后由 Vite HMR 立即生效
#   - gateway 仍然通过 opencode-frontend:3000 访问前端，因此主入口保持不变
#   - 请通过 http://127.0.0.1:6658 访问，不要直接访问 frontend 容器端口

services:
  gateway:
    image: opencodeui-gateway:dev
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    container_name: opencode-gateway
    restart: unless-stopped
    ports:
      - '${GATEWAY_PORT:-6658}:6658'
      - '${PREVIEW_PORT:-6659}:6659'
    volumes:
      - opencode-router-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      file-service:
        condition: service_healthy
    environment:
      - TARGET_CONTAINER=opencode-backend
      - ROUTER_STATE_FILE=/data/routes.json
      - ROUTER_SCAN_INTERVAL=${ROUTER_SCAN_INTERVAL:-5}
      - ROUTER_TOKEN_LENGTH=${ROUTER_TOKEN_LENGTH:-12}
      - ROUTER_PORT_RANGE=${ROUTER_PORT_RANGE:-3000-9999}
      - ROUTER_EXCLUDE_PORTS=${ROUTER_EXCLUDE_PORTS:-4096}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}
      - PREVIEW_DOMAIN=${PREVIEW_DOMAIN:-}
      - ROUTER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
      - ROUTER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-}
    networks:
      - opencode-net

  frontend:
    image: node:22-alpine
    container_name: opencode-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
      - opencode-frontend-node-modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - NODE_ENV=development
      - VITE_API_BASE_URL=/api
      - NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmjs.org/}
      - NPM_REGISTRY_FALLBACK=${NPM_REGISTRY_FALLBACK:-https://registry.npmmirror.com/}
    command: >-
      sh -c "set -eu;
      LOCK_HASH=$$(sha256sum package-lock.json | awk '{print $$1}');
      CACHED_HASH=$$(cat node_modules/.package-lock.hash 2>/dev/null || true);
      if [ ! -d node_modules ] || [ \"$$LOCK_HASH\" != \"$$CACHED_HASH\" ]; then
      npm config set registry \"$$NPM_REGISTRY\";
      npm config set fetch-retries 5;
      npm config set fetch-retry-factor 2;
      npm config set fetch-retry-mintimeout 10000;
      npm config set fetch-retry-maxtimeout 120000;
      npm config set audit false;
      npm config set fund false;
      if npm ci --no-audit --prefer-offline; then
      echo $$LOCK_HASH > node_modules/.package-lock.hash;
      else
      echo \"npm ci failed on $$NPM_REGISTRY, retrying with $$NPM_REGISTRY_FALLBACK\";
      npm cache clean --force;
      npm config set registry \"$$NPM_REGISTRY_FALLBACK\";
      npm ci --no-audit || { echo \"npm ci failed on both registries\"; exit 1; };
      echo $$LOCK_HASH > node_modules/.package-lock.hash;
      fi;
      fi &&
      npm run dev -- --host 0.0.0.0 --port 3000"
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000').then(res => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 60s
    expose:
      - '3000'
    networks:
      - opencode-net

  backend:
    image: opencodeui-backend:dev
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: opencode-backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    volumes:
      - ${OPENCODE_USER_HOME:-./data/opencode-user}/.agents:/root/.agents
      - ${OPENCODE_USER_HOME:-./data/opencode-user}/.config/opencode:/root/.config/opencode
      - ${OPENCODE_USER_HOME:-./data/opencode-user}/.cache/opencode:/root/.cache/opencode
      - ${OPENCODE_USER_HOME:-./data/opencode-user}/.local/share/opencode:/root/.local/share/opencode
      - ${OPENCODE_USER_HOME:-./data/opencode-user}/.local/state/opencode:/root/.local/state/opencode
      - ${OPENCODE_USER_HOME:-./data/opencode-user}/.ssh:/root/.ssh:ro
      - ${OPENCODE_USER_HOME:-./data/opencode-user}/workspace:/root/workspace
    working_dir: /root/workspace
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - HTTP_PROXY=${OPENCODE_HTTP_PROXY:-}
      - HTTPS_PROXY=${OPENCODE_HTTPS_PROXY:-}
      - ALL_PROXY=${OPENCODE_ALL_PROXY:-}
      - NO_PROXY=${OPENCODE_NO_PROXY:-127.0.0.1,localhost,host.docker.internal}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1:4096/global/health']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - opencode-net

  file-service:
    image: opencodeui-file-service:dev
    build:
      context: .
      dockerfile: docker/Dockerfile.file-service
    container_name: opencode-file-service
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    volumes:
      - ${OPENCODE_USER_HOME:-./data/opencode-user}/workspace:/workspace
    environment:
      - FILE_SERVICE_BASE_PATH=/workspace
      - FILE_SERVICE_PORT=4097
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:4097/health >/dev/null 2>&1']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - opencode-net
volumes:
  opencode-router-data:
  opencode-frontend-node-modules:

networks:
  opencode-net:
    name: opencode-net
